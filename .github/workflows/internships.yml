name: Summer2026 Internships Watcher

on:
  schedule:
    - cron: "*/20 9-23 * * *"  # 每天 09:00–23:00，每 20 分鐘
  workflow_dispatch: {}      # 允許手動觸發

permissions:
  contents: write   # 需要回寫 sent.json
  actions: read

jobs:
  fetch-and-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run watcher
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAIL:   ${{ secrets.TO_EMAIL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # 內建自動提供，或自行設定 PAT 也可
        run: |
          python .github/scripts/check_internships.py

      - name: Commit and push sent.json if changed
        if: success()
        run: |
          if [[ -n "$(git status --porcelain data/sent.json 2>/dev/null)" ]]; then
            git config user.name "actions-bot"
            git config user.email "actions@github.com"
            git add data/sent.json
            git commit -m "chore: update sent.json"
            git push
          fi