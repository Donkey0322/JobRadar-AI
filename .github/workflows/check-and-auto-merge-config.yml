name: Check and Auto Merge Setup Config

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  check-and-merge:
    if: startsWith(github.head_ref, 'setup/config-')
    runs-on: ubuntu-latest

    env:
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      AI_API_KEY: ${{ secrets.AI_API_KEY }}
      PAT: ${{ secrets.PAT }}

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Check required secrets
        run: |
          missing=0

          if [ -z "$SMTP_PASS" ]; then
            echo "::error::Missing GitHub Actions secret: SMTP_PASS"
            missing=1
          fi

          if [ -z "$AI_API_KEY" ]; then
            echo "::error::Missing GitHub Actions secret: AI_API_KEY"
            missing=1
          fi

          # Only keep this if your project really requires PAT.
          if [ -z "$PAT" ]; then
            echo "::warning::PAT is not set. If your workflow requires PAT, add it in GitHub Actions Secrets."
          fi

          exit "$missing"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check config
        run: pnpm jobctl setup check-config

      - name: Merge PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --squash \
            --delete-branch \
            --admin=false

      - name: Close setup issue
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const match = body.match(/setup issue #(\d+)/i);

            if (!match) return;

            const issue_number = Number(match[1]);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: "✅ Setup PR passed validation and was merged. Your `config.json` is now ready.",
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              state: "closed",
            });
