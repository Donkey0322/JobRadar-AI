name: Notify Latest Jobs

on:
  push:
    paths:
      - "data/jobs.ndjson"
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read

concurrency:
  group: notify-jobs
  cancel-in-progress: false

jobs:
  notify-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ✅ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ✅ Setup pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      # ✅ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      # ✅ Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ✅ Check jobs.ndjson diff
      - name: Detect jobs.ndjson changes
        id: diff
        run: |
          if git diff --quiet HEAD^ HEAD -- data/jobs.ndjson; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # ✅ Notify latest jobs
      - name: Notify jobs
        if: steps.diff.outputs.changed == 'true'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}

          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}

          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BACKUP_GEMINI_API_KEY: ${{ secrets.BACKUP_GEMINI_API_KEY }}

          LOG_PRETTY: "1"

        run: |
          pnpm jobctl notify latest
